<div class="auth-container">
  <div class="auth-card glass-panel animate-fade-in">
    <div class="auth-header">
      <h2>Welcome Back</h2>
      <p>Log in to manage your tasks</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      <div class="form-group">
        <label class="form-label">Email</label>
        <input
          type="email"
          formControlName="email"
          class="form-control"
          placeholder="name@company.com"
          [class.is-invalid]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
        />
        <span
          class="error-text"
          *ngIf="loginForm.get('email')?.hasError('required') && loginForm.get('email')?.touched"
        >
          Email is required
        </span>
        <span
          class="error-text"
          *ngIf="loginForm.get('email')?.hasError('email') && loginForm.get('email')?.touched"
        >
          Please enter a valid email address
        </span>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input
          type="password"
          formControlName="password"
          class="form-control"
          placeholder="••••••••"
          [class.is-invalid]="
            loginForm.get('password')?.invalid && loginForm.get('password')?.touched
          "
        />
        <span
          class="error-text"
          *ngIf="
            loginForm.get('password')?.hasError('required') && loginForm.get('password')?.touched
          "
        >
          Password is required
        </span>
      </div>

      <button type="submit" class="btn btn-primary w-100" [disabled]="isLoading">
        <span *ngIf="isLoading" class="loader me-2"></span>
        {{ isLoading ? 'Logging in...' : 'Log In' }}
      </button>
    </form>

    <div class="auth-footer">
      <p>Don't have an account? <a routerLink="/register">Register here</a></p>
    </div>
  </div>
</div>
